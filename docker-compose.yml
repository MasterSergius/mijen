services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mijen:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Postgres connection — 'db' is the hostname inside the compose network
      DATABASE_URL: ${DATABASE_URL}
      # Workspace directory (mounted below)
      WORKSPACES_DIR: /app/workspaces
      # Webhook protection — set a strong random secret
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # Optional HTTP Basic Auth for the UI
      MIJEN_AUTH_USER: ${MIJEN_AUTH_USER:-}
      MIJEN_AUTH_PASS: ${MIJEN_AUTH_PASS:-}
      # Public base URL used when displaying webhook URLs in the UI
      MIJEN_PUBLIC_URL: ${MIJEN_PUBLIC_URL:-http://localhost:8080}
    volumes:
      - workspaces:/app/workspaces
      - ${LOCAL_PROJECTS_DIR:-/tmp/mijen-local-projects}:/mnt/projects
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  workspaces:
